<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Homelab Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="top-bar">
    <div class="time-block">
        <div id="clock"></div>
        <div id="date"></div>
    </div>

    <div class="search-container">
        <input type="text" id="search" placeholder="Search services or press Enter to search web...">
    </div>

    <div class="weather-block">
        <div id="weather-temp"></div>
        <div id="weather-desc"></div>
        <div id="weather-location"></div>
    </div>
</header>

<main>

    <div class="controls">
        <button id="addServiceBtn">+ Add Service</button>
    </div>

    <!-- SERVICES -->
    <section id="categoriesContainer"></section>

    <!-- EXTRA PANELS -->
    <section class="extras">

        <!-- BOOKMARKS -->
        <div class="bookmarks-section">
            <h2>Bookmarks</h2>
            <div id="bookmarksContainer" class="bookmark-grid"></div>
            <button id="addBookmarkBtn">+ Add Bookmark</button>
        </div>

        <!-- NOTES -->
        <div class="notes-section">
            <h2>Notes</h2>
            <textarea id="notesArea" placeholder="Write your notes here..."></textarea>
        </div>

    </section>

</main>

<!-- SERVICE MODAL -->
<div id="serviceModal" class="modal hidden">
    <div class="modal-content">
        <h2>Add / Edit Service</h2>
        <input type="text" id="serviceName" placeholder="Service Name">
        <input type="text" id="serviceUrl" placeholder="https://portainer.local">
        <input type="text" id="serviceDesc" placeholder="Description">
        <input type="text" id="serviceCategory" placeholder="Category">
        <input type="text" id="serviceIcon" placeholder="Custom Icon URL (optional)">

        <div class="modal-buttons">
            <button id="saveService">Save</button>
            <button id="deleteService" class="danger hidden">Delete</button>
            <button id="cancelService" class="secondary">Cancel</button>
        </div>
    </div>
</div>

<!-- IMPORTANT: MODULE MODE -->
<script type="module" src="main.js"></script>

</body>
</html>
